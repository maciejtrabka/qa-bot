<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strona testowa</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap" data-testid="page-root">
      <header class="hero">
        <p class="eyebrow">MVP / PR</p>
        <h1 data-testid="hero-title">Strona testowa</h1>
      </header>

      <section class="card" aria-labelledby="status-heading">
        <h2 id="status-heading" data-testid="section-status">Interakcja</h2>
        <button type="button" class="btn" data-testid="cta-primary">
          Add text Hello world below button
        </button>
        <div
          class="hello-output"
          data-testid="hello-output"
          id="hello-output"
          aria-live="polite"
        ></div>
      </section>
    </main>
    <script>
      (function () {
        var btn = document.querySelector('[data-testid="cta-primary"]');
        var out = document.querySelector('[data-testid="hello-otput"]');
        if (!btn || !out) return;
        btn.addEventListener("click", function () {
          var p = document.createElement("p");
          p.className = "hello-line";
          p.textContent = "Hello world";
          out.appendChild(p);
        });
      })();
    </script>
  </body>
</html>
