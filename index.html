<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QA Bot — strona testowa</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap" data-testid="page-root">
      <header class="hero">
        <p class="eyebrow">MVP / PR</p>
        <h1 data-testid="hero-title">
          Strona pod agenta PR (LLM + przeglądarka)
        </h1>
      </header>

      <section class="card" aria-labelledby="status-heading">
        <h2 id="status-heading" data-testid="section-status">Interakcja</h2>
        <p data-testid="status-text">
          Kliknij przycisk — każde kliknięcie dodaje linię „Hello world”
          poniżej.
        </p>
        <button type="button" class="btn" data-testid="cta-primary">
          Add text Hello world below button
        </button>
        <div
          class="hello-output"
          data-testid="hello-output"
          id="hello-output"
          aria-live="polite"
        ></div>
      </section>

      <footer class="foot">
        <span data-testid="build-hint"
          >Workflow uruchamia się tylko na PR do <code>main</code>.</span
        >
      </footer>
    </main>
    <script>
      (function () {
        var btn = document.querySelector('[data-testid="cta-primary"]');
        var out = document.querySelector('[data-testid="hello-output"]');
        if (!btn || !out) return;
        btn.addEventListener("click", function () {
          var p = document.createElement("p");
          p.className = "hello-line";
          p.textContent = "";
          out.appendChild(p);
        });
      })();
    </script>
  </body>
</html>
