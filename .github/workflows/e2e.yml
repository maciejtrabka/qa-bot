# E2E na URL z deployu Vercel (preview dla PR).
# Wymaga podpięcia projektu Vercel do repo GitHub (Deployments w zakładce PR).
#
# Trigger: deployment_status (success) — gdy Vercel zgłosi gotowy deployment.
# Vercel używa GitHub Deployments API; w UI środowisko preview to zwykle dokładnie
# „Preview” (czasem „Preview – …”) — patrz warunek joba poniżej.
# URL: deployment_status.environment_url (preferowane), fallback target_url
# (w praktyce Vercel / społeczność: oba bywają używane — stąd fallback w kroku „Ustal BASE_URL”).
#
# Uwaga: plik workflow musi być na domyślnej gałęzi (np. main), żeby GitHub mógł
# uruchamiać ten workflow dla zdarzeń zewnętrznych (w tym deployment_status).
#
# Jeśli preview zwraca „Login – Vercel”: w Vercel włącz „Protection Bypass for Automation”,
# skopiuj sekret do GitHub → Settings → Secrets → Actions jako VERCEL_AUTOMATION_BYPASS_SECRET.

name: E2E

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      base_url:
        description: "BASE_URL dla Playwright (np. produkcja albo ręczny preview)"
        required: false
        default: "https://qa-bot-self.vercel.app/"
        type: string

concurrency:
  group: e2e-${{ github.event_name == 'deployment_status' && github.event.deployment.id || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  playwright:
    # Preview: tylko sukces deployu + środowisko preview (nie Production).
    # Ręcznie: workflow_dispatch — smoke z domyślną produkcją lub podanym URL.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       (github.event.deployment.environment == 'Preview' ||
        github.event.deployment.environment == 'preview' ||
        startsWith(github.event.deployment.environment, 'Preview')))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (commit z deployu)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'deployment_status' && github.event.deployment.sha || github.sha }}

      - name: Kontekst deployu (log — publiczny preview URL)
        if: github.event_name == 'deployment_status'
        run: |
          echo "deployment.environment=${{ github.event.deployment.environment }}"
          echo "deployment_status.state=${{ github.event.deployment_status.state }}"
          echo "deployment.sha=${{ github.event.deployment.sha }}"
          echo "environment_url=${{ github.event.deployment_status.environment_url }}"
          echo "target_url=${{ github.event.deployment_status.target_url }}"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Ustal BASE_URL
        id: base
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            U="${{ github.event.inputs.base_url }}"
            echo "url=${U:-https://qa-bot-self.vercel.app/}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          U="${{ github.event.deployment_status.environment_url }}"
          if [ -z "$U" ] || [ "$U" = "null" ]; then
            U="${{ github.event.deployment_status.target_url }}"
          fi
          if [ -z "$U" ] || [ "$U" = "null" ]; then
            echo "::error::Brak environment_url i target_url w deployment_status — sprawdź integrację Vercel ↔ GitHub."
            exit 1
          fi
          echo "url=$U" >> "$GITHUB_OUTPUT"

      - name: Run Playwright
        env:
          CI: true
          BASE_URL: ${{ steps.base.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm run test:e2e

      # Jeden request do OpenRouter (klucz tylko w GitHub Secret OPENROUTER_API_KEY).
      # Po sukcesie E2E na preview: krótka sugestia QA w komentarzu na PR (jeśli commit jest w PR).
      # Prompt zawiera tytuł/opis PR oraz obcięty unified diff (bez wklejania sekretów do repo).
      - name: OpenRouter — komentarz QA na PR
        if: success() && github.event_name == 'deployment_status'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BASE_URL: ${{ steps.base.outputs.url }}
          DEPLOY_SHA: ${{ github.event.deployment.sha }}
          DEPLOY_ENV: ${{ github.event.deployment.environment }}
        run: |
          set -euo pipefail
          if [ -z "${OPENROUTER_API_KEY:-}" ]; then
            echo "Brak sekretu OPENROUTER_API_KEY — pomijam LLM."
            exit 0
          fi

          PR="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${DEPLOY_SHA}/pulls" -H "Accept: application/vnd.github+json" --jq '.[0].number // empty' || true)"
          if [ -z "${PR}" ]; then
            echo "Brak powiązanego PR dla tego commita — pomijam komentarz."
            exit 0
          fi

          PR_TITLE="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}" --jq -r '.title // empty' 2>/dev/null || true)"
          PR_BODY="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}" --jq -r '.body // empty' 2>/dev/null | head -c 12000 || true)"
          DIFF_RAW="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR}" -H "Accept: application/vnd.github.v3.diff" 2>/dev/null | head -c 60000 || true)"

          BODY_FILE="$(mktemp)"
          COMMENT_FILE="$(mktemp)"
          trap 'rm -f "$BODY_FILE" "$COMMENT_FILE"' EXIT

          PROMPT="$(jq -n -r \
            --arg url "$BASE_URL" \
            --arg env "$DEPLOY_ENV" \
            --arg sha "$DEPLOY_SHA" \
            --arg title "$PR_TITLE" \
            --arg body "$PR_BODY" \
            --arg diff "$DIFF_RAW" \
            '
              [
                "Playwright E2E zakończył się sukcesem dla tego preview.",
                "",
                "URL: " + $url,
                "Środowisko deployu: " + $env,
                "SHA: " + $sha,
                "",
                "## Pull request (kontekst zmian)",
                "**Tytuł:** " + $title,
                "",
                "**Opis PR (może być obcięty):**",
                $body,
                "",
                "**Unified diff (może być obcięty; pomoc do zrozumienia zakresu — w publicznym komentarzu nie cytuj surowego diffu ani wartości mogących być sekretami):**",
                $diff,
                "",
                "Napisz po polsku krótki komentarz dla recenzenta PR (markdown): 3–6 punktów listy.",
                "Priorytet: zasugeruj kontrole ręczne powiązane z widocznymi zmianami w diffie lub opisie (UI, a11y, copy, responsywność, edge cases).",
                "Nie ograniczaj się do ogólników, jeśli diff coś sugeruje. Nie powtarzaj wprost, że automatyczne testy przeszły. Bez nagłówka „#”; zacznij od zdania wstępu w 1 linii, potem lista."
              ] | join("\n")
            ')"

          jq -n \
            --arg model "meta-llama/llama-3.3-70b-instruct:free" \
            --arg content "$PROMPT" \
            '{model: $model, temperature: 0.4, messages: [{role: "user", content: $content}]}' > "$BODY_FILE"

          RESP="$(curl -sS https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${GITHUB_REPOSITORY}" \
            -H "X-Title: qa-bot-e2e" \
            -d @"$BODY_FILE")"

          if printf '%s' "$RESP" | jq -e '.error' >/dev/null 2>&1; then
            echo "OpenRouter API error:"
            printf '%s\n' "$RESP" | jq -c . | head -c 4000
            exit 1
          fi

          CONTENT="$(printf '%s' "$RESP" | jq -r '.choices[0].message.content // empty')"
          if [ -z "$CONTENT" ]; then
            echo "OpenRouter zwrócił pustą treść lub błąd:"
            printf '%s\n' "$RESP" | head -c 2000
            exit 1
          fi

          {
            echo "### Podpowiedź QA (OpenRouter, auto)"
            echo ""
            echo "$CONTENT"
            echo ""
            echo "<sub>Model: \`meta-llama/llama-3.3-70b-instruct:free\` · wygenerowane w workflow E2E po zielonym Playwright · prompt z tytułem/opisem/obciętym diffem PR.</sub>"
          } > "$COMMENT_FILE"

          gh pr comment "$PR" --repo "${GITHUB_REPOSITORY}" --body-file "$COMMENT_FILE"
          echo "Dodano komentarz na PR #${PR}."

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
